<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOQ Mission Control - Profit Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="overlay">
        <div class="start-card">
            <h1 style="margin-top:0; color:var(--text-main)">EOQ MISSION CONTROL</h1>
            <p style="color:#64748b; margin-bottom:25px;">Set your inventory parameters and<br>maximize your net profit.</p>
            <button class="start-btn" onclick="startMission()">LAUNCH MISSION</button>
        </div>
    </div>

    <div class="stat-bar">
        <div class="stat-card day-box"><span class="stat-label">Timer</span><span id="dayCounter" class="stat-val" style="color:var(--primary)">DAY 0</span></div>
        <div class="stat-card"><span class="stat-label">Stock</span><span id="stockVal" class="stat-val" style="color:var(--success)">-</span></div>
        <div class="stat-card" style="border-color: #0ea5e9"><span class="stat-label">Sales</span><span id="salesVal" class="stat-val" style="color:#0ea5e9">-</span></div>
        <div class="stat-card"><span class="stat-label">Lost ☹</span><span id="lostVal" class="stat-val" style="color:var(--danger)">-</span></div>
        <div class="stat-card"><span class="stat-label">Costs</span><span id="totalCostVal" class="stat-val">$0</span></div>
        <div class="stat-card" style="border-color: var(--violet)"><span class="stat-label">Revenue</span><span id="totalRevVal" class="stat-val" style="color:var(--violet)">$0</span></div>
        <div class="stat-card" id="profitCard" style="border-width:3px;"><span class="stat-label">Net Profit</span><span id="profitVal" class="stat-val">$0</span></div>
        <div class="stat-card" style="border-color: var(--warning)"><span class="stat-label">ROP</span><span id="ropVal" class="stat-val" style="color:var(--warning)">-</span></div>
        <div class="stat-card" style="gap:4px; border:none; background:transparent;">
            <button id="freezeBtn" class="btn-small" style="background:var(--danger); width:100%;" onclick="toggleFreeze()">PAUSE</button>
            <button class="btn-small" style="background:#64748b; width:100%;" onclick="resetSim()">RESET</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="input-group"><label>Initial Inv</label><input type="number" id="inInit" value="100"></div>
            <div class="input-group"><label>Demand (D)</label><input type="number" id="inD" value="10"></div>
            <div class="input-group"><label>Selling Price</label><input type="number" id="inSellPrice" value="25"></div>
            <div class="input-group"><label>Setup Cost (K)</label><input type="number" id="inS" value="100"></div>
            <div class="input-group"><label>Unit Price (P)</label><input type="number" id="inP" value="10"></div>
            <div class="input-group"><label>Holding Cost (h)</label><input type="number" id="inH" value="0.2"></div>
            <div class="input-group"><label>Lead Time (L)</label><input type="number" id="inLT" value="5"></div>
            <div class="input-group"><label>Order Qty (Q)</label><input type="number" id="inQ" value="100"></div>
            <div class="speed-box">
                <label style="font-size:0.7rem; font-weight:800; color:#475569; display:block; margin-bottom:5px;">SIM SPEED</label>
                <input type="range" id="speedRange" min="50" max="550" value="350" style="width:100%; accent-color:var(--primary);">
            </div>
            
            <div class="btn-stack">
                <button id="autoOrderBtn" class="auto-btn" onclick="toggleAutoOrder()">AUTO-ORDER: OFF</button>
                <button id="orderBtn" class="order-btn" onclick="placeOrder()">PLACE ORDER</button>
            </div>
            <div id="shipCount" style="text-align:center; font-weight:bold; color:var(--primary); font-size:0.8rem; margin-top:5px;">Shipments Pending: 0</div>
        </div>

        <div class="content">
            <div class="visual-box">
                <div class="plant">🏭</div>
                <div id="truck">🚚</div>
                <div class="road"></div>
            </div>
            <div class="chart-grid">
                <div class="chart-container"><canvas id="inventoryChart"></canvas></div>
                <div class="chart-container"><canvas id="procurementChart"></canvas></div>
                <div class="chart-container"><canvas id="holdingChart"></canvas></div>
                <div class="chart-container"><canvas id="stockoutChart"></canvas></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
